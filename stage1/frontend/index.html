<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1 - 基础聊天助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #161625; border-right: 1px solid #2a2a3e; padding: 24px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 18px; color: #4A90D9; margin-bottom: 8px; }
        .sidebar .badge { display: inline-block; background: #4A90D9; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 16px; }
        .sidebar .info { font-size: 13px; color: #888; line-height: 1.8; }
        .sidebar .info strong { color: #bbb; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #2a2a3e; font-size: 16px; color: #4A90D9; font-weight: 600; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; }
        .msg { margin-bottom: 16px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .msg.user .bubble { background: #4A90D9; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #1e1e32; border: 1px solid #2a2a3e; border-bottom-left-radius: 4px; }
        .msg .tag { font-size: 11px; color: #666; margin-bottom: 4px; }
        .input-area { padding: 16px 24px; border-top: 1px solid #2a2a3e; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #4A90D9; }
        .input-area button { background: #4A90D9; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 14px; }
        .input-area button:hover { background: #3a7bc8; }
        .mock-tag { font-size: 11px; color: #f0ad4e; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stage 1</h2>
        <span class="badge">LLM Wrapper</span>
        <div class="info">
            <strong>核心能力：</strong><br>
            封装 LLM API，实现基础问答
            <br><br>
            <strong>配置 API：</strong><br>
            config/config.go
            <br><br>
            <strong>LLM 模型：</strong><br>
            <span id="modelInfo">加载中...</span>
            <br><br>
            <strong>Temperature：</strong><br>
            0.7
            <br><br>
            <strong>系统 Prompt：</strong><br>
            你是一个简洁的AI助手，请用简短清晰的方式回答问题
        </div>
    </div>
    <div class="main">
        <div class="header">基础聊天助手</div>
        <div class="messages" id="messages">
            <div class="msg assistant">
                <div>
                    <div class="tag">🤖 助手</div>
                    <div class="bubble">你好！我是基础聊天助手，你可以问我任何问题。</div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()">发送</button>
        </div>
    </div>
    <script>
        document.getElementById('modelInfo').textContent = 'ernie-bot-4 (模拟模式)';
        async function send() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMessage('user', msg);
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                const suffix = data.is_mock ? '<span class="mock-tag">[模拟]</span>' : '';
                addMessage('assistant', data.reply + suffix);
            } catch (e) {
                addMessage('assistant', '请求失败: ' + e.message);
            }
        }
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const label = role === 'user' ? '👤 你' : '🤖 助手';
            div.innerHTML = `<div><div class="tag">${label}</div><div class="bubble">${content}</div></div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        }
    </script>
</body>
</html>
