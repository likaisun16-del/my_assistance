<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 4 - ReAct 多步推理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #161625; border-right: 1px solid #2a2a3e; padding: 24px; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; color: #8E44AD; margin-bottom: 8px; }
        .sidebar .badge { display: inline-block; background: #8E44AD; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 16px; }
        .sidebar .info { font-size: 13px; color: #888; line-height: 1.8; }
        .sidebar .info strong { color: #bbb; }
        .flow { margin-top: 16px; }
        .flow-step { background: #1e1e32; border-left: 3px solid #8E44AD; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; border-radius: 0 6px 6px 0; }
        .flow-step .label { color: #8E44AD; font-weight: 600; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #2a2a3e; font-size: 16px; color: #8E44AD; font-weight: 600; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; }
        .msg { margin-bottom: 16px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .msg.user .bubble { background: #8E44AD; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #1e1e32; border: 1px solid #2a2a3e; border-bottom-left-radius: 4px; }
        .msg .tag { font-size: 11px; color: #666; margin-bottom: 4px; }
        .react-step { background: #1a1030; border: 1px solid #2a1a3e; border-radius: 8px; padding: 10px 14px; margin: 6px 0; font-size: 13px; }
        .react-step.thought { border-left: 3px solid #8E44AD; }
        .react-step.action { border-left: 3px solid #E67E22; }
        .react-step.observation { border-left: 3px solid #27AE60; }
        .react-step.final { border-left: 3px solid #3498DB; background: #0f1a2e; }
        .react-step .type-label { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
        .react-step.thought .type-label { color: #8E44AD; }
        .react-step.action .type-label { color: #E67E22; }
        .react-step.observation .type-label { color: #27AE60; }
        .react-step.final .type-label { color: #3498DB; }
        .input-area { padding: 16px 24px; border-top: 1px solid #2a2a3e; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #8E44AD; }
        .input-area button { background: #8E44AD; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stage 4</h2>
        <span class="badge">ReAct</span>
        <div class="info">
            <strong>核心循环：</strong><br>
            Thought → Action → Observation
            <br><br>
            <strong>最大迭代：</strong>5 次<br>
            <strong>LLM模型：</strong>ernie-bot-4
        </div>
        <div class="flow">
            <div class="flow-step"><span class="label">1.</span> 💭 分析问题</div>
            <div class="flow-step"><span class="label">2.</span> 🔧 选择工具</div>
            <div class="flow-step"><span class="label">3.</span> 👁️ 观察结果</div>
            <div class="flow-step"><span class="label">4.</span> 🔄 继续或结束</div>
            <div class="flow-step"><span class="label">5.</span> ✅ 汇总回答</div>
        </div>
    </div>
    <div class="main">
        <div class="header">ReAct 多步推理助手</div>
        <div class="messages" id="messages">
            <div class="msg assistant"><div><div class="tag">🤖 助手</div><div class="bubble">我可以自动拆解复合问题！试试："现在几点 + 东京天气 + 总结一句话"</div></div></div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="输入复合问题..." onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()">发送</button>
        </div>
    </div>
    <script>
        const typeIcons = { Thought: '💭', Action: '🔧', Observation: '👁️', 'Final Answer': '✅' };
        const typeClass = { Thought: 'thought', Action: 'action', Observation: 'observation', 'Final Answer': 'final' };
        async function send() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMessage('user', msg);
            const res = await fetch('/api/react', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
            const data = await res.json();
            let html = '';
            data.steps.forEach(s => {
                const cls = typeClass[s.type] || '';
                const icon = typeIcons[s.type] || '';
                html += `<div class="react-step ${cls}"><div class="type-label">${icon} ${s.type}</div><div>${s.content}</div></div>`;
            });
            addMessage('assistant', html, true);
        }
        function addMessage(role, content, isHtml) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const label = role === 'user' ? '👤 你' : '🤖 助手';
            div.innerHTML = `<div><div class="tag">${label}</div><div class="bubble">${isHtml ? content : content.replace(/\n/g, '<br>')}</div></div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        }
    </script>
</body>
</html>
