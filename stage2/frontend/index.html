<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 2 - RAG 知识库助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: #161625; border-right: 1px solid #2a2a3e; padding: 24px; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; color: #27AE60; margin-bottom: 8px; }
        .sidebar .badge { display: inline-block; background: #27AE60; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 16px; }
        .sidebar .info { font-size: 13px; color: #888; line-height: 1.8; }
        .sidebar .info strong { color: #bbb; }
        .chunk-list { margin-top: 16px; }
        .chunk-item { background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; color: #aaa; line-height: 1.5; }
        .chunk-item .id { color: #27AE60; font-weight: 600; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #2a2a3e; font-size: 16px; color: #27AE60; font-weight: 600; }
        .upload-area { padding: 16px 24px; border-bottom: 1px solid #2a2a3e; background: #12121f; }
        .upload-area label { font-size: 13px; color: #888; display: block; margin-bottom: 8px; }
        .upload-area textarea { width: 100%; height: 80px; background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 10px; color: #e0e0e0; font-size: 13px; resize: none; outline: none; }
        .upload-area textarea:focus { border-color: #27AE60; }
        .upload-area button { margin-top: 8px; background: #27AE60; color: #fff; border: none; border-radius: 6px; padding: 8px 20px; cursor: pointer; font-size: 13px; }
        .upload-area button:hover { background: #219a52; }
        .upload-status { font-size: 12px; color: #27AE60; margin-top: 6px; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; }
        .msg { margin-bottom: 16px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .msg.user .bubble { background: #27AE60; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #1e1e32; border: 1px solid #2a2a3e; border-bottom-left-radius: 4px; }
        .msg .tag { font-size: 11px; color: #666; margin-bottom: 4px; }
        .search-result { background: #1a2a1a; border: 1px solid #27AE60; border-radius: 6px; padding: 8px 12px; margin: 8px 0; font-size: 12px; color: #aaa; }
        .search-result .sim { color: #27AE60; font-weight: 600; }
        .input-area { padding: 16px 24px; border-top: 1px solid #2a2a3e; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #27AE60; }
        .input-area button { background: #27AE60; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stage 2</h2>
        <span class="badge">RAG</span>
        <div class="info">
            <strong>聊天模型：</strong><br>ernie-bot-4<br><br>
            <strong>向量化模型：</strong><br>embedding-v1<br><br>
            <strong>切片大小：</strong>200 字符<br>
            <strong>Top-K：</strong>3
        </div>
        <div class="chunk-list" id="chunkList"></div>
    </div>
    <div class="main">
        <div class="header">RAG 知识库助手</div>
        <div class="upload-area">
            <label>上传文档到知识库：</label>
            <textarea id="docInput" placeholder="粘贴文档内容...">Go语言是Google在2009年推出的开源编程语言。核心特性包括：并发编程（goroutine和channel）、编译速度快、垃圾回收、标准库丰富、跨平台部署。Docker就是用Go语言开发的著名项目。</textarea>
            <button onclick="uploadDoc()">上传文档</button>
            <div class="upload-status" id="uploadStatus"></div>
        </div>
        <div class="messages" id="messages">
            <div class="msg assistant"><div><div class="tag">🤖 助手</div><div class="bubble">请先上传文档到知识库，然后提问。我会基于文档内容回答。</div></div></div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="输入问题..." onkeydown="if(event.key==='Enter')query()">
            <button onclick="query()">提问</button>
        </div>
    </div>
    <script>
        async function uploadDoc() {
            const content = document.getElementById('docInput').value.trim();
            if (!content) return;
            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content})
            });
            const data = await res.json();
            document.getElementById('uploadStatus').textContent = `✅ 已切分为 ${data.chunk_count} 个片段并建立向量索引`;
            const list = document.getElementById('chunkList');
            list.innerHTML = '<strong style="color:#bbb;font-size:13px;">文档切片：</strong>';
            data.chunks.forEach(c => {
                list.innerHTML += `<div class="chunk-item"><span class="id">#${c.id}</span> ${c.content.substring(0,50)}...</div>`;
            });
        }
        async function query() {
            const input = document.getElementById('input');
            const q = input.value.trim();
            if (!q) return;
            input.value = '';
            addMessage('user', q);
            const res = await fetch('/api/query', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: q})
            });
            const data = await res.json();
            if (!data.has_doc) {
                addMessage('assistant', '请先上传文档！');
                return;
            }
            let html = data.answer.replace(/\n/g, '<br>');
            if (data.results && data.results.length > 0) {
                html += '<br><br><strong>🔍 检索结果：</strong>';
                data.results.forEach((r, i) => {
                    html += `<div class="search-result">#${i+1} <span class="sim">相似度: ${r.similarity.toFixed(4)}</span><br>${r.chunk.content}</div>`;
                });
            }
            addMessage('assistant', html, true);
        }
        function addMessage(role, content, isHtml) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const label = role === 'user' ? '👤 你' : '🤖 助手';
            const bubble = isHtml ? content : content.replace(/\n/g,'<br>');
            div.innerHTML = `<div><div class="tag">${label}</div><div class="bubble">${bubble}</div></div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        }
    </script>
</body>
</html>
