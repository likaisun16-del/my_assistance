<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 6 - Harness 稳定助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 300px; background: #161625; border-right: 1px solid #2a2a3e; padding: 20px; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; color: #C0392B; margin-bottom: 8px; }
        .sidebar .badge { display: inline-block; background: #C0392B; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 16px; }
        .sidebar .info { font-size: 13px; color: #888; line-height: 1.8; }
        .sidebar .info strong { color: #bbb; }
        .snap-section h3 { font-size: 13px; color: #bbb; margin: 16px 0 8px; border-bottom: 1px solid #2a2a3e; padding-bottom: 4px; }
        .snap-item { background: #1e1e32; border-radius: 6px; padding: 8px 10px; margin-bottom: 4px; font-size: 12px; cursor: pointer; transition: border-color 0.2s; border: 1px solid transparent; }
        .snap-item:hover { border-color: #C0392B; }
        .snap-item .time { color: #C0392B; font-weight: 600; }
        .snap-item .detail { color: #888; margin-top: 2px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #2a2a3e; font-size: 16px; color: #C0392B; font-weight: 600; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; }
        .msg { margin-bottom: 16px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .msg.user .bubble { background: #C0392B; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #1e1e32; border: 1px solid #2a2a3e; border-bottom-left-radius: 4px; }
        .msg .tag { font-size: 11px; color: #666; margin-bottom: 4px; }
        .step-card { background: #1a1020; border-radius: 8px; padding: 10px 14px; margin: 6px 0; font-size: 13px; border-left: 3px solid #666; }
        .step-card.done { border-left-color: #27AE60; }
        .step-card.failed { border-left-color: #C0392B; }
        .step-card.running { border-left-color: #f0ad4e; }
        .step-card .step-name { font-weight: 600; }
        .step-card.done .step-name { color: #27AE60; }
        .step-card.failed .step-name { color: #C0392B; }
        .step-card.running .step-name { color: #f0ad4e; }
        .step-card .step-detail { color: #888; font-size: 12px; margin-top: 4px; }
        .retry-badge { background: #f0ad4e; color: #000; padding: 1px 6px; border-radius: 4px; font-size: 11px; margin-left: 6px; }
        .input-area { padding: 16px 24px; border-top: 1px solid #2a2a3e; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #C0392B; }
        .input-area button { background: #C0392B; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stage 6</h2>
        <span class="badge">Harness</span>
        <div class="info">
            <strong>最大重试：</strong>3 次<br>
            <strong>重试间隔：</strong>200ms<br>
            <strong>单步超时：</strong>5000ms<br><br>
            <strong>功能：</strong>状态管理 + 错误重试 + 超时控制 + 快照恢复
        </div>
        <div class="snap-section">
            <h3>📸 快照列表</h3>
            <div id="snapshotList"><div style="color:#666;font-size:12px;">执行任务后显示</div></div>
        </div>
    </div>
    <div class="main">
        <div class="header">Harness 稳定 AI 助手</div>
        <div class="messages" id="messages">
            <div class="msg assistant"><div><div class="tag">🤖 助手</div><div class="bubble">我是工程级稳定助手，具备错误重试、超时控制、快照恢复能力。试试"现在几点+东京天气+总结"。</div></div></div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="输入任务..." onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()">执行任务</button>
        </div>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMessage('user', msg);
            const res = await fetch('/api/task', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
            const state = await res.json();
            renderTask(state);
            loadSnapshots();
        }
        function renderTask(state) {
            let html = `<div style="font-size:12px;color:#888;margin-bottom:8px;">任务 ${state.task_id} | 状态: <strong>${state.status}</strong></div>`;
            state.steps.forEach(s => {
                const cls = s.status === 'done' ? 'done' : s.status === 'failed' ? 'failed' : 'running';
                const icon = s.status === 'done' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
                const retry = s.retry_count > 0 ? `<span class="retry-badge">重试${s.retry_count}次</span>` : '';
                html += `<div class="step-card ${cls}"><div class="step-name">${icon} Step ${s.id}: ${s.name}${retry}</div>`;
                if (s.result) html += `<div class="step-detail">结果: ${s.result}</div>`;
                if (s.error) html += `<div class="step-detail" style="color:#C0392B;">错误: ${s.error}</div>`;
                html += `</div>`;
            });
            if (state.result) {
                html += `<div style="margin-top:10px;padding:10px;background:#0f1a0f;border:1px solid #27AE60;border-radius:8px;font-size:14px;">🎯 最终回答: ${state.result}</div>`;
            }
            addMessage('assistant', html, true);
        }
        async function loadSnapshots() {
            const res = await fetch('/api/snapshots');
            const snaps = await res.json();
            const list = document.getElementById('snapshotList');
            list.innerHTML = '';
            snaps.forEach((s, i) => {
                list.innerHTML += `<div class="snap-item" onclick="restore(${i})"><div class="time">📸 快照 #${i} - ${s.timestamp}</div><div class="detail">${s.step_count} 步 | ${s.last_step}</div></div>`;
            });
        }
        async function restore(index) {
            if (!confirm(`从快照 #${index} 恢复任务？`)) return;
            addMessage('user', `从快照 #${index} 恢复任务`);
            const res = await fetch('/api/restore', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ index }) });
            const state = await res.json();
            renderTask(state);
            loadSnapshots();
        }
        function addMessage(role, content, isHtml) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const label = role === 'user' ? '👤 你' : '🤖 助手';
            div.innerHTML = `<div><div class="tag">${label}</div><div class="bubble">${isHtml ? content : content.replace(/\n/g, '<br>')}</div></div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        }
    </script>
</body>
</html>
