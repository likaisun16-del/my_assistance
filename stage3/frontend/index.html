<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 3 - Tool Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: #161625; border-right: 1px solid #2a2a3e; padding: 24px; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; color: #E67E22; margin-bottom: 8px; }
        .sidebar .badge { display: inline-block; background: #E67E22; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 16px; }
        .sidebar .info { font-size: 13px; color: #888; line-height: 1.8; }
        .sidebar .info strong { color: #bbb; }
        .tool-card { background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px; margin-top: 8px; }
        .tool-card .name { color: #E67E22; font-weight: 600; font-size: 14px; }
        .tool-card .desc { color: #888; font-size: 12px; margin-top: 4px; }
        .tool-card .params { font-size: 11px; color: #666; margin-top: 4px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #2a2a3e; font-size: 16px; color: #E67E22; font-weight: 600; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; }
        .msg { margin-bottom: 16px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .msg.user .bubble { background: #E67E22; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #1e1e32; border: 1px solid #2a2a3e; border-bottom-left-radius: 4px; }
        .msg .tag { font-size: 11px; color: #666; margin-bottom: 4px; }
        .tool-call-box { background: #2a1e10; border: 1px solid #E67E22; border-radius: 8px; padding: 10px 14px; margin: 8px 0; font-size: 13px; }
        .tool-call-box .label { color: #E67E22; font-weight: 600; }
        .tool-call-box .detail { color: #aaa; font-size: 12px; margin-top: 4px; }
        .input-area { padding: 16px 24px; border-top: 1px solid #2a2a3e; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #E67E22; }
        .input-area button { background: #E67E22; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stage 3</h2>
        <span class="badge">Tool Agent</span>
        <div class="info">
            <strong>LLM 角色：</strong>调度器<br><br>
            <strong>流程：</strong>用户输入 → LLM选工具 → 执行 → 回答
        </div>
        <div id="toolList" style="margin-top:16px;"></div>
    </div>
    <div class="main">
        <div class="header">Tool Agent 工具调用助手</div>
        <div class="messages" id="messages">
            <div class="msg assistant"><div><div class="tag">🤖 助手</div><div class="bubble">你好！我可以帮你查时间、查天气、搜索信息。试试问我："现在几点？"、"东京天气如何？"</div></div></div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="试试：现在几点？/ 东京天气？/ AI应用工程师是什么？" onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()">发送</button>
        </div>
    </div>
    <script>
        fetch('/api/tools').then(r=>r.json()).then(tools=>{
            const list=document.getElementById('toolList');
            list.innerHTML='<strong style="color:#bbb;font-size:13px;">可用工具：</strong>';
            tools.forEach(t=>{
                const params=t.parameters.map(p=>`${p.name}(${p.type}${p.required?'*':''})`).join(', ');
                list.innerHTML+=`<div class="tool-card"><div class="name">🔧 ${t.name}</div><div class="desc">${t.description}</div><div class="params">参数: ${params||'无'}</div></div>`;
            });
        });
        async function send() {
            const input=document.getElementById('input');
            const msg=input.value.trim();
            if(!msg)return;
            input.value='';
            addMessage('user',msg);
            const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
            const data=await res.json();
            let html=data.reply.replace(/\n/g,'<br>');
            if(data.tool_call){
                const tc=data.tool_call;
                const params=Object.entries(tc.params||{}).map(([k,v])=>`${k}=${v}`).join(', ')||'无';
                html+=`<div class="tool-call-box"><div class="label">🔧 调用工具: ${tc.tool_name}</div><div class="detail">参数: ${params}</div><div class="detail">结果: ${tc.tool_result}</div></div>`;
            }
            addMessage('assistant',html,true);
        }
        function addMessage(role,content,isHtml){
            const div=document.createElement('div');
            div.className='msg '+role;
            const label=role==='user'?'👤 你':'🤖 助手';
            div.innerHTML=`<div><div class="tag">${label}</div><div class="bubble">${isHtml?content:content.replace(/\n/g,'<br>')}</div></div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop=99999;
        }
    </script>
</body>
</html>
