<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 5 - Memory 记忆助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 300px; background: #161625; border-right: 1px solid #2a2a3e; padding: 20px; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; color: #E74C8B; margin-bottom: 8px; }
        .sidebar .badge { display: inline-block; background: #E74C8B; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-bottom: 16px; }
        .mem-section { margin-bottom: 16px; }
        .mem-section h3 { font-size: 13px; color: #bbb; margin-bottom: 6px; border-bottom: 1px solid #2a2a3e; padding-bottom: 4px; }
        .mem-item { background: #1e1e32; border-radius: 6px; padding: 8px 10px; margin-bottom: 4px; font-size: 12px; color: #aaa; line-height: 1.5; }
        .mem-item .key { color: #E74C8B; font-weight: 600; }
        .pref-item { display: flex; justify-content: space-between; }
        .pref-item .val { color: #27AE60; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #2a2a3e; font-size: 16px; color: #E74C8B; font-weight: 600; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; }
        .msg { margin-bottom: 16px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .msg.user .bubble { background: #E74C8B; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #1e1e32; border: 1px solid #2a2a3e; border-bottom-left-radius: 4px; }
        .msg .tag { font-size: 11px; color: #666; margin-bottom: 4px; }
        .extracted { background: #2a1a2e; border: 1px solid #E74C8B; border-radius: 6px; padding: 6px 10px; margin-top: 6px; font-size: 12px; color: #E74C8B; }
        .input-area { padding: 16px 24px; border-top: 1px solid #2a2a3e; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #1e1e32; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #E74C8B; }
        .input-area button { background: #E74C8B; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stage 5</h2>
        <span class="badge">Memory</span>
        <div class="mem-section">
            <h3>🎯 用户偏好</h3>
            <div id="preferences"><div class="mem-item" style="color:#666;">暂无</div></div>
        </div>
        <div class="mem-section">
            <h3>💾 长期记忆</h3>
            <div id="longTerm"><div class="mem-item" style="color:#666;">暂无</div></div>
        </div>
        <div class="mem-section">
            <h3>💬 短期记忆 (<span id="stmCount">0</span>条)</h3>
            <div id="shortTerm"><div class="mem-item" style="color:#666;">暂无</div></div>
        </div>
    </div>
    <div class="main">
        <div class="header">带记忆的 AI 助手</div>
        <div class="messages" id="messages">
            <div class="msg assistant"><div><div class="tag">🤖 助手</div><div class="bubble">你好！我会记住你告诉我的事情。试试说"我喜欢周杰伦"，然后问"推荐音乐"。</div></div></div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="试试：我喜欢周杰伦 / 推荐音乐 / 我叫小明" onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()">发送</button>
        </div>
    </div>
    <script>
        function updateSidebar(data) {
            const prefs = document.getElementById('preferences');
            if (data.preferences && Object.keys(data.preferences).length > 0) {
                prefs.innerHTML = '';
                for (const [k,v] of Object.entries(data.preferences)) {
                    prefs.innerHTML += `<div class="mem-item pref-item"><span class="key">${k}</span><span class="val">${v}</span></div>`;
                }
            }
            document.getElementById('stmCount').textContent = data.short_term_count || 0;
        }
        async function loadMemory() {
            const res = await fetch('/api/memory');
            const data = await res.json();
            const prefs = document.getElementById('preferences');
            if (data.preference && Object.keys(data.preference).length > 0) {
                prefs.innerHTML = '';
                for (const [k,v] of Object.entries(data.preference)) {
                    prefs.innerHTML += `<div class="mem-item pref-item"><span class="key">${k}</span><span class="val">${v}</span></div>`;
                }
            }
            const lt = document.getElementById('longTerm');
            if (data.long_term && data.long_term.length > 0) {
                lt.innerHTML = '';
                data.long_term.forEach(m => { lt.innerHTML += `<div class="mem-item">${m.content}</div>`; });
            }
            const st = document.getElementById('shortTerm');
            if (data.short_term && data.short_term.length > 0) {
                st.innerHTML = '';
                data.short_term.slice(-6).forEach(m => {
                    const label = m.role === 'user' ? '👤' : '🤖';
                    st.innerHTML += `<div class="mem-item">${label} ${m.content.substring(0,30)}${m.content.length>30?'...':''}</div>`;
                });
            }
            document.getElementById('stmCount').textContent = data.short_term ? data.short_term.length : 0;
        }
        async function send() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMessage('user', msg);
            const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
            const data = await res.json();
            let html = data.reply.replace(/\n/g, '<br>');
            if (data.extracted_info) {
                html += `<div class="extracted">🧠 ${data.extracted_info}</div>`;
            }
            addMessage('assistant', html, true);
            updateSidebar(data);
            loadMemory();
        }
        function addMessage(role, content, isHtml) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const label = role === 'user' ? '👤 你' : '🤖 助手';
            div.innerHTML = `<div><div class="tag">${label}</div><div class="bubble">${isHtml ? content : content.replace(/\n/g, '<br>')}</div></div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        }
    </script>
</body>
</html>
